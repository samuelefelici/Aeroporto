# Configurazione Streamlit per il deploy in container dietro reverse proxy
# (Coolify usa Traefik). Questi valori sono anche impostati via env STREAMLIT_*
# nel Dockerfile: qui restano come riferimento e per l'uso locale.

[server]
headless = true
address = "0.0.0.0"
port = 8501
# Dietro il reverse proxy di Coolify (Traefik) disabilitare CORS/XSRF evita
# errori di upload dei PDF e problemi con i websocket.
enableCORS = false
enableXsrfProtection = false
# Limite upload (MB): i PDF orari sono piccoli, 50 MB è abbondante.
maxUploadSize = 50

[browser]
gatherUsageStats = false

[theme]
# L'app usa card/sfondi scuri: il tema scuro le rende coerenti.
base = "dark"
