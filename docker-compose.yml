# docker-compose per Coolify (build pack "Docker Compose").
#
# Coolify: seleziona "Docker Compose" e punta a questo file. Il routing e
#          l'HTTPS li gestisce Coolify tramite Traefik sulla rete interna
#          Docker, raggiungendo la porta 8501 del container.
#
# Test locale: scommenta il blocco `ports` qui sotto e lancia
#              `docker compose up --build`  ->  http://localhost:8501
#              (in alternativa usa il Dockerfile: `docker run -p 8501:8501 ...`).

services:
  flight-matrix:
    build:
      context: .
      dockerfile: Dockerfile
    # `expose` rende la porta raggiungibile solo dal proxy interno di Coolify
    # (Traefik), senza pubblicarla sull'host: niente conflitti di porta né
    # accesso in HTTP non cifrato che scavalca il dominio/HTTPS.
    expose:
      - "8501"
    # --- Solo per test locale: scommenta per pubblicare la porta sull'host ---
    # ports:
    #   - "8501:8501"
    environment:
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=4).read().strip()==b'ok' else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
